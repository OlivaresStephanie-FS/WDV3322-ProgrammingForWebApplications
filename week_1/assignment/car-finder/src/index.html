<!DOCTYPE html>
<!-- Declares the document type as HTML5 -->

<html lang="en">
<!-- Root element of the page, with language set to English -->

<head>
  <meta charset="UTF-8" />
  <!-- Sets character encoding so special characters display correctly -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Ensures proper scaling and responsiveness on mobile devices -->

  <title>Car Finder</title>
  <!-- Title displayed in the browser tab -->
</head>

<body>
  <!-- Contains all visible content of the webpage -->

  <main class="app">
    <!-- Main container for the application (used for layout/styling) -->

    <section class="hero">
      <!-- Section that contains the main heading, description, and form -->

      <h1>Car Finder</h1>
      <!-- Main heading displayed to the user -->

      <p>
        Looking for your dream vehicle? Use the form below to find the car of your dreams.
      </p>
      <!-- Description text to guide the user -->

      <div class="form">
        <!-- Container for the dropdown inputs -->

        <div class="form-group">
          <!-- Groups label and select element together for styling and structure -->

          <label for="year">Year</label>
          <!-- Label connected to the Year dropdown using the "for" attribute -->

          <select id="year">
            <!-- Dropdown for selecting a car year (JavaScript will populate options) -->

            <option value="">Select Year</option>
            <!-- Default placeholder option -->
          </select>
        </div>

        <div class="form-group">
          <!-- Second dropdown group for selecting car make -->

          <label for="make">Make</label>

          <select id="make" disabled>
            <!-- Disabled initially until a year is selected -->

            <option value="">Select Make</option>
          </select>
        </div>

        <div class="form-group">
          <!-- Third dropdown group for selecting car model -->

          <label for="model">Model</label>

          <select id="model" disabled>
            <!-- Disabled initially until year and make are selected -->

            <option value="">Select Model</option>
          </select>
        </div>

      </div>
    </section>

    <script src="bundle.js"></script>
    <!-- Loads the compiled JavaScript file generated by Webpack -->
    <!-- This file contains my index.js logic and connects functionality to the page -->

  </main>
</body>
</html>
